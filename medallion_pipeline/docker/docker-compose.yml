version: "3.9"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__LOGGING__LOG_LEVEL: INFO
  PIPELINE_HOME: /opt/medallion_pipeline

services:

  # ─── PostgreSQL – Metadata & Airflow backend ────────────────
  postgres:
    image: postgres:15-alpine
    container_name: medallion-postgres
    environment:
      POSTGRES_DB:       pipeline_metadata
      POSTGRES_USER:     pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/metadata/01_create_metadata_tables.sql:/docker-entrypoint-initdb.d/01_metadata.sql
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U pipeline_user -d pipeline_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Separate Postgres for Airflow ──────────────────────────
  postgres-airflow:
    image: postgres:15-alpine
    container_name: medallion-postgres-airflow
    environment:
      POSTGRES_DB:       airflow
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Apache Airflow ─────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.2
    container_name: medallion-airflow-init
    environment:
      <<: *airflow-env
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@company.com
          --password admin
      "
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/medallion_pipeline
    depends_on:
      postgres-airflow:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.9.2
    container_name: medallion-airflow-web
    environment:
      <<: *airflow-env
    ports:
      - "8080:8080"
    command: airflow webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/medallion_pipeline
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.9.2
    container_name: medallion-airflow-scheduler
    environment:
      <<: *airflow-env
    command: airflow scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/medallion_pipeline
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy

  # ─── Hadoop NameNode ─────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: medallion-namenode
    hostname: namenode
    environment:
      CLUSTER_NAME: medallion
    ports:
      - "9870:9870"   # Web UI
      - "9000:9000"   # RPC
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
    env_file:
      - ./docker/hadoop.env

  # ─── Hadoop DataNode ─────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: medallion-datanode
    hostname: datanode
    volumes:
      - hdfs-datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./docker/hadoop.env
    depends_on:
      - namenode

  # ─── Apache Spark Master ─────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: medallion-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "8090:8080"   # Spark Web UI (shifted to avoid Airflow clash)
      - "7077:7077"
    volumes:
      - .:/opt/medallion_pipeline

  spark-worker:
    image: bitnami/spark:3.5
    container_name: medallion-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes:
      - .:/opt/medallion_pipeline

  # ─── Hive Metastore ──────────────────────────────────────────
  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: medallion-hive-metastore
    environment:
      SERVICE_PRECONDITION: "namenode:9870 postgres:5432"
    env_file:
      - ./docker/hadoop.env
    depends_on:
      - namenode
      - postgres

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: medallion-hive-server
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: >-
        jdbc:postgresql://postgres/hive_metastore
      SERVICE_PRECONDITION: "hive-metastore:9083"
    ports:
      - "10000:10000"   # Thrift / JDBC
      - "10002:10002"   # Hive Web UI
    env_file:
      - ./docker/hadoop.env
    depends_on:
      - hive-metastore

volumes:
  postgres-data:
  postgres-airflow-data:
  hdfs-namenode:
  hdfs-datanode:
